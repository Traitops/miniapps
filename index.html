<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ставка-Босс</title>
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #0f1218; --glass: rgba(255, 255, 255, 0.05); --neon-blue: #00f2ff; --neon-red: #ff4d4d; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; margin-bottom: 12px; text-align: center; }
        .label { font-size: 12px; opacity: 0.7; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 32px; font-weight: 800; transition: 0.3s; }
        .row { display: flex; justify-content: space-between; gap: 10px; }
        .card-half { flex: 1; }
        .danger { color: var(--neon-red); }
        .safe { color: var(--neon-blue); }
        .controls { display: flex; gap: 15px; margin-top: auto; padding-bottom: 20px; }
        button { flex: 1; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
        .btn-up { background: linear-gradient(135deg, #0088cc, #00f2ff); }
        .btn-down { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        #game-over { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #event-alert { display: none; position: fixed; top: 10%; left: 10%; right: 10%; background: #ffcc00; color: #000; padding: 15px; border-radius: 10px; font-weight: bold; z-index: 100; text-align: center; }
    </style>
</head>
<body>

    <div id="event-alert">🚨 СОБЫТИЕ!</div>

    <div class="row">
        <div class="card card-half">
            <div class="label">Курс $</div>
            <div id="rub-val" class="value">98.5</div>
        </div>
        <div class="card card-half">
            <div class="label">ВВП</div>
            <div id="vvp-val" class="value safe">+1.2%</div>
        </div>
    </div>

    <div class="card">
        <div class="label">Ключевая Ставка</div>
        <div id="rate-val" class="value safe">16.0%</div>
    </div>

    <div class="card">
        <div class="label">Инфляция</div>
        <div id="inflation-val" class="value danger">11.2%</div>
    </div>

    <div style="text-align: center; opacity: 0.5; font-size: 14px;">Бюджет выживания: <span id="time-val">0</span> сек.</div>

    <div class="controls">
        <button class="btn-down" onclick="changeRate(-1)">СНИЗИТЬ</button>
        <button class="btn-up" onclick="changeRate(1)">ПОДНЯТЬ</button>
    </div>

    <div id="game-over">
        <h1 id="death-title" style="color: var(--neon-red);">ДЕФОЛТ!</h1>
        <p id="death-reason"></p>
        <button class="btn-up" style="width: 100%; margin-bottom: 10px;" onclick="location.reload()">ПОПРОБОВАТЬ СНОВА</button>
    </div>

    <script>
        // Инициализация Telegram WebApp с проверкой
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        // Стартовые данные
        let rate = 16.0;
        let inflation = 11.2;
        let vvp = 1.2;
        let rub = 98.5;
        let time = 0;
        let isGameOver = false;

        // Функция изменения ставки (привязывается к кнопкам)
        window.changeRate = function(val) {
            if (isGameOver) return;
            rate += val;
            if (rate < 0) rate = 0;
            if (rate > 50) rate = 50;
            
            // Обновляем текст сразу после нажатия
            document.getElementById('rate-val').innerText = rate.toFixed(1) + "%";
            
            // Вибрация
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            console.log("Ставка изменена на:", rate);
        };

        // Главный цикл игры
        const gameLoop = setInterval(() => {
            if (isGameOver) return;
            
            time++;
            
            // Экономическая логика
            inflation += (22 - rate) * 0.1 + (Math.random() * 0.4 - 0.2);
            vvp -= (rate - 14) * 0.04 + (inflation > 15 ? 0.1 : 0);
            rub += (inflation * 0.15) - (rate * 0.05);

            // Обновление цифр на экране
            document.getElementById('inflation-val').innerText = inflation.toFixed(1) + "%";
            document.getElementById('vvp-val').innerText = (vvp > 0 ? "+" : "") + vvp.toFixed(1) + "%";
            document.getElementById('rub-val').innerText = rub.toFixed(1);
            document.getElementById('time-val').innerText = time;

            // Цвета
            document.getElementById('inflation-val').style.color = inflation > 15 ? "#ff4d4d" : "#00f2ff";
            document.getElementById('vvp-val').style.color = vvp < 0 ? "#ff4d4d" : "#00f2ff";

            // Условия проигрыша
            if (inflation > 40) end("Гиперинфляция! Деньги превратились в фантики.");
            if (vvp < -15) end("Экономика в коме. Заводы стоят.");
            if (rub > 250) end("Курс рубля улетел в космос. Импорт невозможен.");
        }, 1000);

        function end(reason) {
            isGameOver = true;
            clearInterval(gameLoop);
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('death-reason').innerText = reason;
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        console.log("Скрипт загружен и готов к работе!");
    </script>
</body>
</html>
